<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="37" fill="url(#grad)"/>
  <!-- Medical cross -->
  <rect x="55" y="30" width="70" height="120" rx="12" fill="white" fill-opacity="0.95"/>
  <rect x="30" y="55" width="120" height="70" rx="12" fill="white" fill-opacity="0.95"/>
  <!-- Heartbeat line -->
  <polyline points="40,90 65,90 75,60 90,120 105,70 115,90 140,90" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
</svg>
